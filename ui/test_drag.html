<!DOCTYPE html>
<html>
<body>
  <div id="dragMe" draggable="true" style="width: 50px; height: 50px; background: red;">Drag me</div>
  <script>
    const el = document.getElementById('dragMe');
    el.addEventListener('dragstart', (e) => {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', 'test');
    });
    el.addEventListener('drag', (e) => {
      if (e.buttons & 2) { // right click
        console.log("right click detected during drag");
        el.style.display = 'none'; // Try to cancel drag by hiding
        setTimeout(() => el.style.display = 'block', 100);
      }
    });
  </script>
</body>
</html>
